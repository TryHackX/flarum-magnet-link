tryhackx-magnet-link:
    admin:
        settings:
            # Ustawienia ogólne
            guest_visible_label: "Widoczność dla gości"
            guest_visible_help: "Pozwól gościom widzieć linki magnet. Jeśli wyłączone, goście zobaczą komunikat z prośbą o rejestrację lub logowanie."

            activated_only_label: "Tylko aktywowani użytkownicy"
            activated_only_help: "Tylko użytkownicy z potwierdzonym adresem email mogą widzieć linki magnet. To ustawienie dotyczy tylko zalogowanych użytkowników."

            # Ustawienia scrapera
            scraper_enabled_label: "Włącz skrobanie trackerów"
            scraper_enabled_help: "Po włączeniu rozszerzenie będzie odpytywać trackery o statystyki seed/leech/pobrań. Po wyłączeniu wyświetlana będzie tylko nazwa torrenta i licznik kliknięć."

            http_only_label: "Tylko trackery HTTP(S)"
            http_only_help: "Odpytuj tylko trackery HTTP i HTTPS. Włącz, jeśli Twój dostawca hostingu nie zezwala na połączenia UDP."

            allow_private_trackers_label: "Zezwól na trackery prywatne/wewnętrzne"
            allow_private_trackers_help: "Domyślnie trackery wskazujące na adresy prywatne, loopback lub zarezerwowane są blokowane, aby serwer nie mógł zostać użyty do łączenia się z usługami wewnętrznymi (SSRF). Włącz tylko jeśli świadomie hostujesz tracker w sieci prywatnej."

            check_all_label: "Sprawdź wszystkie trackery"
            check_all_help: "Odpytaj wszystkie dostępne trackery i agreguj wyniki zgodnie z ustawieniem typu wyświetlania."

            display_type_label: "Rodzaj wyświetlania"
            display_type_help: "Jak agregować statystyki przy sprawdzaniu wielu trackerów."
            display_type_average: "Średnia dla wszystkich wartości"
            display_type_average_max: "Średnia dla seed/leech, maksimum dla pobrań"
            display_type_max_all: "Maksymalne wartości dla wszystkiego"

            tracker_timeout_label: "Limit czasu trackera (sekundy)"
            tracker_timeout_help: "Maksymalny czas oczekiwania na odpowiedź trackera. Ustaw 0 dla domyślnego (2 sekundy)."

            max_trackers_label: "Maksymalna liczba trackerów"
            max_trackers_help: "Maksymalna liczba trackerów odpytywanych na jeden magnet. Ustaw 0, aby użyć wbudowanego limitu bezpieczeństwa (12). Dodatkowo obowiązuje twardy budżet czasu, więc pojedynczy magnet nie zawiesi żądania."

            scraper_max_redirects_label: "Maks. przekierowań trackera"
            scraper_max_redirects_help: "Ile przekierowań HTTP(S) podążyć przy scrapowaniu trackera. Domyślnie 0 (nie podążaj). Zwiększ do 1-2, jeśli tracker jest za Cloudflare lub CDN przekierowującym http→https. Każdy hop jest nadal walidowany guardem SSRF, więc tracker nie przekieruje żądania na adres prywatny/wewnętrzny."

            priority_trackers_label: "Trackery priorytetowe"
            priority_trackers_help: "Opcjonalne. Jeden host trackera na linię (np. tracker.opentrackr.org). Jeśli magnet zawiera któryś z nich, są odpytywane najpierw, w tej kolejności — najbardziej przydatne w domyślnym trybie „zatrzymaj na pierwszym odpowiadającym”, dzięki czemu statystyki pochodzą z zaufanego trackera, a do tego poprawia się szybkość i dokładność. Tylko zmiana kolejności: trackery spoza magnetu nigdy nie są dodawane, a guard SSRF, filtry schematu/HTTP oraz limity nadal obowiązują."
            scraper_host_allowlist_label: "Biała lista hostów trackerów (bezpieczeństwo)"
            scraper_host_allowlist_help: "Opcjonalne. Jeden zaufany host trackera na linię. Gdy niepusta, odpytywane są WYŁĄCZNIE te hosty — trackery podane w treści posta, których nie ma na liście, są pomijane, co zamyka powierzchnię SSRF / DNS-rebinding dla trackerów podstawionych przez autora posta. Zostaw puste (domyślnie), aby odpytywać dowolny publiczny host (zachowanie jak dotąd). Guard SSRF, filtry schematu / HTTP oraz limity nadal obowiązują."

            # Ustawienia cache
            cache_enabled_label: "Cache wyników trackerów"
            cache_enabled_help: "Buforuj statystyki seed/leech/pobrań, aby ponowne wyświetlenia i najechania na dymek nie odpytywały trackerów na nowo. Zdecydowanie zalecane — to także główna ochrona przed obciążeniem generowanym najeżdżaniem myszką. Steruje zarówno cache serwerowym, jak i przeglądarkowym."
            cache_ttl_label: "Czas życia cache (sekundy)"
            cache_ttl_help: "Jak długo zbuforowane statystyki pozostają ważne. Domyślnie 300 (5 minut). Ustaw 0, aby wyłączyć cache (niezalecane)."

            # Limity ręcznego odświeżania (przycisk odświeżania przy linku)
            refresh_cooldown_label: "Cooldown odświeżania (sekundy)"
            refresh_cooldown_help: "Minimalny czas między ręcznymi odświeżeniami tego samego magneta (globalny — jedno odświeżenie aktualizuje współdzielony wynik widoczny dla wszystkich, więc nie można odświeżyć ponownie szybciej). 0 = brak cooldownu. Wymaga włączonego cache, aby współdzielić odświeżony wynik."
            refresh_limit_count_label: "Limit odświeżeń (na IP)"
            refresh_limit_count_help: "Maksymalna liczba ręcznych odświeżeń, jaką pojedynczy IP (działa też dla gości) może wykonać w oknie poniżej. 0 = bez limitu."
            refresh_limit_window_label: "Okno limitu odświeżeń (sekundy)"
            refresh_limit_window_help: "Przesuwne okno czasu dla limitu odświeżeń na IP. Każde wykorzystane odświeżenie zwalnia się ponownie, gdy stanie się starsze niż to okno. Domyślnie 600 (10 minut)."

            # Ustawienia śledzenia kliknięć
            click_tracking_label: "Włącz śledzenie kliknięć"
            click_tracking_help: "Śledź i wyświetlaj liczbę kliknięć każdego linku magnet."

            # Tooltip listy dyskusji
            tooltip_enabled_label: "Włącz dymek dyskusji"
            tooltip_enabled_help: "Pokazuj statystyki linków magnet po najechaniu na dyskusję na liście dyskusji."

            tooltip_max_magnets_label: "Maks. magnetów w dymku"
            tooltip_max_magnets_help: "Maksymalna liczba linków magnet wyświetlanych w dymku dyskusji. Ustaw 0 dla nieograniczonej."

            tooltip_show_permission_errors_label: "Pokazuj komunikat o uprawnieniach w dymku"
            tooltip_show_permission_errors_help: "Gdy gość lub użytkownik bez uprawnień najedzie na temat z magnet linkami, pokaż w dymku czytelny komunikat (\"Musisz być zalogowany…\") zamiast pozwalać mu zniknąć po krótkim mignięciu stanu ładowania. Działa analogicznie do widoku w poście. Domyślnie włączone."

            # Własna nazwa torrenta
            rename_enabled_label: "Włącz własne nazwy torrentów"
            rename_enabled_help: "Pozwól autorom postów na zmianę wyświetlanej nazwy linku magnet w ich własnych postach."

            # Styl wyświetlania karty
            desktop_style_label: "Styl karty na desktopie"
            desktop_style_help: "Wybierz układ karty magnet w poście na desktopie. Telefony zawsze używają układu mobilnego, niezależnie od tego ustawienia."
            desktop_style_standard: "Standardowy (obecny)"
            desktop_style_mobile: "Styl mobilny (także na desktopie)"
            desktop_style_desc_standard: "Układ standardowy: karta w jednym rzędzie — ikona, nazwa torrenta w jednej linii (ucinana wielokropkiem, pełna w dymku po najechaniu), licznik kliknięć oraz przyciski kopiuj/odśwież."
            desktop_style_desc_mobile: "Układ mobilny wszędzie: w wierszu 1 ikona oraz licznik kliknięć i przyciski kopiuj/odśwież; pełna nazwa torrenta zawija się do własnego wiersza poniżej (dłuższe nazwy pozostają czytelne); statystyki seed/leech/pobrań w jednej linii z fontem skalującym się do dopasowania. Dostrój zawijaną nazwę i wyrównanie statystyk poniżej."
            name_max_lines_label: "Maks. linii nazwy"
            name_max_lines_help: "Maksymalna liczba linii, jaką może zająć zawijana nazwa torrenta, zanim zostanie ucięta wielokropkiem na ostatniej linii. Dotyczy układu mobilnego (telefony oraz desktop, gdy wybrano styl mobilny)."
            stats_justify_label: "Wyrównanie statystyk"
            stats_justify_help: "Jak statystyki seed / leech / pobrań są rozłożone w swojej jednej linii w układzie mobilnym."
            stats_justify_space_between: "Do obu krawędzi (space-between)"
            stats_justify_space_around: "Równe odstępy wokół (space-around)"
            stats_justify_center: "Wyśrodkowane"
            stats_justify_none: "Brak (od początku)"

            ban_enabled_label: "Włącz ochronę przed spamem"
            ban_enabled_help: "Tymczasowo blokuj adresy IP, które klikają zbyt wiele linków magnet w krótkim czasie, aby zapobiec manipulacji licznikiem kliknięć."

            ban_time_label: "Czas bana (minuty)"
            ban_time_help: "Jak długo IP jest zablokowane po przekroczeniu limitu kliknięć."

            ban_interval_label: "Interwał bana (minuty)"
            ban_interval_help: "Okno czasowe do zliczania kliknięć w celu określenia, czy IP powinno zostać zbanowane."

            ban_interval_count_label: "Próg bana"
            ban_interval_count_help: "Liczba kliknięć w interwale, która uruchamia bana."

            self_interval_label: "Interwał własnych kliknięć (dni)"
            self_interval_help: "Jak długo zanim to samo IP może ponownie zwiększyć licznik kliknięć dla tego samego linku magnet."

        reparse:
            label: "Przeliczenie magnet linków"
            help: "Linki magnet dodane zanim rozszerzenie zostało włączone są zapisane jako zwykły tekst, więc nie renderują się w postach ani nie pojawiają w dymkach. Uruchom to raz (po włączeniu rozszerzenia lub imporcie starych treści), aby je przetworzyć. Dla bardzo dużych forów użyj CLI: php flarum magnet:reparse"
            button: "Przelicz stare magnet linki"
            success: "Przetworzono {count} post(ów)."
            error: "Nie udało się przeliczyć magnet linków. Sprawdź logi serwera."

        retokenize:
            label: "Bezpieczeństwo tokenów"
            help: "Tokeny magnetów trzymają link poza źródłem strony, więc można go pobrać tylko przez API z kontrolą uprawnień. Starsze wersje wyprowadzały tokeny z publicznej, stałej soli, co pozwalało odwrócić znane torrenty offline wprost z HTML. Uruchom to raz po aktualizacji, aby zabezpieczyć każdy token sekretem unikalnym dla tej strony. Dla bardzo dużych forów użyj CLI: php flarum magnet:retokenize"
            button: "Zabezpiecz tokeny magnetów"
            success: "Zabezpieczono {count} token(ów)."
            error: "Nie udało się zabezpieczyć tokenów. Sprawdź logi serwera."

        maintenance:
            label: "Retencja tabel (duże fora)"
            help: "Tabele magnet_clicks i magnet_bans potrafią urosnąć na ruchliwych lub atakowanych przez boty forach. Przycinanie jest opt-in z rozmysłu (sorty klików czytają magnet_clicks wprost, więc okno retencji to Twoja decyzja). Wepnij to w crona serwera, np. codziennie: php flarum magnet:prune-clicks --days=90  oraz  php flarum magnet:prune-bans"

        support:
            button: "Wesprzyj rozwój"
            title: "Wesprzyj tę modyfikację"
            description: "Jeśli uważasz tę modyfikację za przydatną, rozważ wsparcie jej rozwoju niewielką darowizną. Każdy wkład pomaga utrzymać projekt przy życiu."
            copy: "Kopiuj adres"
            thanks: "Dziękuję za wsparcie!"

    forum:
        loading: "Ładowanie informacji o magnecie..."
        seeds: "Seedy:"
        leeches: "Pijawki:"
        completed: "Pobrano:"
        clicks: "Kliknięcia:"
        size: "Rozmiar:"
        refresh: "Odśwież dane trackerów"
        copy_link: "Skopiuj link magnet do schowka"
        guest_not_allowed: "Musisz być zalogowany, aby zobaczyć linki magnet."
        email_not_confirmed: "Potwierdź swój adres email, aby zobaczyć linki magnet."
        permission_denied: "Nie masz uprawnień do przeglądania linków magnet."
        login: "Zaloguj się"
        register: "Zarejestruj się"
        or: "lub"

        editor:
            tooltip: "Wstaw link Magnet"
            prompt: "Wprowadź link magnet:"
            invalid: "Nieprawidłowy link magnet. Link musi zaczynać się od 'magnet:'"

        tooltip:
            header: "Linki Magnet"
            loading: "Ładowanie informacji o magnetach..."
            no_magnets: "Brak linków magnet w tej dyskusji"

        rename:
            tooltip: "Zmień nazwę torrenta"
            modal_title: "Zmień nazwę torrenta"
            label: "Własna nazwa:"
            save: "Zapisz"
            cancel: "Anuluj"
            restore: "Przywróć oryginalną nazwę"

        errors:
            invalid_magnet: "Nieprawidłowy format linku magnet"
            no_trackers: "Link magnet nie zawiera trackerów"
            no_http_trackers: "Brak trackerów HTTP(S)"
            no_response: "Żaden tracker nie odpowiedział"
            scraper_error: "Nie udało się połączyć z trackerami"
            load_failed: "Nie udało się załadować informacji o magnecie"

        refresh_limit:
            cooldown: "Ten magnet został przed chwilą odświeżony — możesz odświeżyć ponownie za {seconds} s. Wszyscy już widzą najnowszy wynik."
            quota: "Osiągnięto limit odświeżeń. Spróbuj ponownie za {seconds} s."

    # Nazwa uprawnienia (pokazywana w panelu uprawnień admina)
    permissions:
        viewMagnetLinks: "Przeglądanie linków magnet"
